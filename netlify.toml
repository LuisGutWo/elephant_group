[build]
  publish = "out"
  command = "npm run build"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# Redirect all 404s to the index.html for SPA behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Handle trailing slashes
[[redirects]]
  from = "/dark/page-about"
  to = "/dark/page-about/"
  status = 301

[[redirects]]
  from = "/dark/page-contact"
  to = "/dark/page-contact/"
  status = 301

[[redirects]]
  from = "/dark/page-home"
  to = "/dark/page-home/"
  status = 301

[[redirects]]
  from = "/dark/page-portfolio"
