name: Security and Build Checks

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (high and critical)
        run: npm run security:audit

      - name: Build
        run: npm run build
